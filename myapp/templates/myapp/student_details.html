{% extends "myapp/base.html" %}

{% block title %}Student Details{% endblock %}

{% block content %}

<div class="container mt-5">

  <div class="card shadow p-4">
    <h3 class="text-center mb-4">Student Details</h3>

    <div class="d-flex justify-content-between align-items-center border p-3 mb-3">

      <div>
        <h5>Name</h5>
        <p class="mb-0">{{ details.student }}</p>
      </div>

      <div>
        <h5>Date Of Birth</h5>
        <p class="mb-0">{{ details.dob }}</p>
      </div>

      <div>
        <h5>Address</h5>
        <p class="mb-0">{{ details.address }}</p>
      </div>

      <div>
        <h5>Joining Year</h5>
        <p class="mb-0">{{ details.joining_date }}</p>
      </div>

    </div>

  </div>

</div>

{% endblock %}
